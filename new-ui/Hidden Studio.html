// ─── Viewport hook ────────────────────────────────────────────────────────────
const useViewport = () => {
  const [vp, setVp] = React.useState(() => {
    const w = window.innerWidth;
    return w < 600 ? 'phone' : w < 1024 ? 'tablet' : 'desktop';
  });
  React.useEffect(() => {
    const fn = () => {
      const w = window.innerWidth;
      setVp(w < 600 ? 'phone' : w < 1024 ? 'tablet' : 'desktop');
    };
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  return vp;
};

  const [zoom, setZoom] = React.useState(1);
  const [outlineMode, setOutlineMode] = React.useState(false);
  const [pan, setPan] = React.useState({ x: 0, y: 0 });

  const handleWheel = React.useCallback(e => {
    e.preventDefault();
    if (e.ctrlKey || e.metaKey) {
      // Pinch-to-zoom or ctrl+scroll
      setZoom(z => Math.min(32, Math.max(0.05, z * (e.deltaY < 0 ? 1.1 : 0.9))));
    } else {
      setZoom(z => Math.min(32, Math.max(0.05, z * (e.deltaY < 0 ? 1.1 : 0.9))));
    }
  }, []);

  // H key → Hand tool; V/Escape → Select
  React.useEffect(() => {
    const onKey = e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.isContentEditable) return;
      if (e.key === 'h' || e.key === 'H') setActiveTool('Hand');
      if (e.key === 'Escape' || e.key === 'v' || e.key === 'V') setActiveTool('Select');
      if ((e.metaKey || e.ctrlKey) && e.key === 'r') { e.preventDefault(); setShowRulers(r => !r); }
      if ((e.metaKey || e.ctrlKey) && e.key === "'") { e.preventDefault(); setShowGrid(g => !g); }
      if ((e.metaKey || e.ctrlKey) && e.key === 'y') { e.preventDefault(); setOutlineMode(m => !m); }
      if ((e.metaKey || e.ctrlKey) && e.key === '/') { e.preventDefault(); setShowShortcuts(s => !s); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  // Canvas pan drag
  const isPanning = React.useRef(false);
  const panStart = React.useRef({ x: 0, y: 0, px: 0, py: 0 });
  const handleCanvasMouseDown = React.useCallback(e => {
    if (activeTool !== 'Hand') return;
    e.preventDefault();
    isPanning.current = true;
    panStart.current = { x: e.clientX, y: e.clientY, px: pan.x, py: pan.y };
    const onMove = ev => {
      if (!isPanning.current) return;
      setPan({ x: panStart.current.px + ev.clientX - panStart.current.x, y: panStart.current.py + ev.clientY - panStart.current.y });
    };
    const onUp = () => { isPanning.current = false; window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  }, [activeTool, pan]);

  const canvasRef = React.useRef(null);
  React.useEffect(() => {
    const el = canvasRef.current;
    if (!el) return;
    el.addEventListener('wheel', handleWheel, { passive: false });
    return () => el.removeEventListener('wheel', handleWheel);
  }, [handleWheel]);

  const PANEL_DEFS = {
    layers:     { label: 'Layers',     render: () => <LayersPanel /> },
    transform:  { label: 'Transform',  render: () => <TransformPanel /> },
    properties: { label: 'Properties', render: () => <PropertiesPanel /> },
    hitzone:    { label: 'Hit Zone',   render: () => <HitZonePanel /> },
    surprise:   { label: 'Surprise',   render: () => <SurprisePanel /> },
    swatches:   { label: 'Swatches',   render: () => <SwatchesPanel /> },
    navigator:  { label: 'Navigator',  render: () => <NavigatorPanel /> },
    history:    { label: 'History',    render: () => <HistoryPanel /> },
    difficulty: { label: 'Difficulty', render: () => <DifficultyPanel /> },
    project:    { label: 'Project',    render: () => <ProjectPanel name={projectName} onNameChange={setProjectName} /> },
  };
  const zRef = React.useRef(10);
  const groupsRef = React.useRef(groups);
  React.useEffect(() => { groupsRef.current = groups; }, [groups]);

  const T = THEMES[themeKey];

  // ── Group drag ──────────────────────────────────────────────────────────────
  const startGroupDrag = React.useCallback((groupId, e) => {
    e.preventDefault();
    const startX = e.clientX, startY = e.clientY;
    const g = groupsRef.current.find(x => x.id === groupId);
    if (!g) return;
    const initX = g.floating ? g.x : startX - 132;
    const initY = g.floating ? g.y : startY - 14;
    const offX = startX - initX, offY = startY - initY;
    let moved = false;

    const onMove = e => {
      const dx = e.clientX - startX, dy = e.clientY - startY;
      if (!moved && dx * dx + dy * dy < 16) return;
      moved = true;
      const nx = e.clientX - offX, ny = e.clientY - offY;
      setNearDock(e.clientX > window.innerWidth - 290);
      setGroups(prev => prev.map(x => x.id === groupId
        ? { ...x, floating: true, x: nx, y: ny, zIndex: ++zRef.current }
        : x));
    };
    const onUp = e => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      setNearDock(false);
      if (moved && e.clientX > window.innerWidth - 280)
        setGroups(prev => prev.map(x => x.id === groupId ? { ...x, floating: false } : x));
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  }, []);

  // ── Tab drag (split / merge) ────────────────────────────────────────────────
  const startTabDrag = React.useCallback((groupId, tabId, e) => {
    e.stopPropagation();
    const startX = e.clientX, startY = e.clientY;
    let moved = false;

    const onMove = e => {
      const dx = e.clientX - startX, dy = e.clientY - startY;
      if (!moved && dx * dx + dy * dy < 25) return;
      moved = true;
      setTabDrag({ groupId, tabId, x: e.clientX, y: e.clientY });
    };
    const onUp = e => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      if (!moved) { setTabDrag(null); return; }

      const el = document.elementFromPoint(e.clientX, e.clientY);
      const header = el && el.closest('[data-group-header]');
      const targetId = header && header.dataset.groupHeader;
      setTabDrag(null);

      if (targetId && targetId !== groupId) {
        // Merge tab into target group
        setGroups(prev => {
          const src = prev.find(x => x.id === groupId);
          if (!src) return prev;
          const newSrcTabs = src.tabs.filter(t => t !== tabId);
          return prev
            .filter(x => !(x.id === groupId && newSrcTabs.length === 0))
            .map(x => {
              if (x.id === groupId) return { ...x, tabs: newSrcTabs, activeTab: 0 };
              if (x.id === targetId) return { ...x, tabs: [...x.tabs, tabId], activeTab: x.tabs.length };
              return x;
            });
        });
      } else {
        // Detach tab into new floating group (or just float single-tab group)
        setGroups(prev => {
          const src = prev.find(x => x.id === groupId);
          if (!src) return prev;
          if (src.tabs.length === 1) {
            return prev.map(x => x.id === groupId
              ? { ...x, floating: true, x: e.clientX - 132, y: e.clientY - 14, zIndex: ++zRef.current }
              : x);
          }
          const newSrcTabs = src.tabs.filter(t => t !== tabId);
          return [
            ...prev.map(x => x.id === groupId ? { ...x, tabs: newSrcTabs, activeTab: 0 } : x),
            { id: `g${Date.now()}`, tabs: [tabId], activeTab: 0, minimized: false, floating: true,
              x: e.clientX - 132, y: e.clientY - 14, width: 264, height: 420, zIndex: ++zRef.current },
          ];
        });
      }
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  }, []);

  const updateGroup  = React.useCallback(u => setGroups(p => p.map(g => g.id === u.id ? { ...g, ...u } : g)), []);
  const removeGroup  = React.useCallback(id => {
    setGroups(p => {
      const g = p.find(x => x.id === id);
      if (g) setClosedPanels(cp => [...new Set([...cp, ...g.tabs])]);
      return p.filter(x => x.id !== id);
    });
  }, []);
  const reopenPanel  = tabId => {
    setClosedPanels(p => p.filter(t => t !== tabId));
    setGroups(p => [...p, {
      id: `g${Date.now()}`, tabs: [tabId], activeTab: 0, minimized: false,
      floating: true, x: 300, y: 160, width: 264, height: 420, zIndex: ++zRef.current,
    }]);
    setWinMenu(false);
  };

  const dockedGroups   = groups.filter(g => !g.floating);
  const floatingGroups = groups.filter(g => g.floating).sort((a, b) => a.zIndex - b.zIndex);
  const pgProps = { onUpdate: updateGroup, onRemove: removeGroup, panelDefs: PANEL_DEFS, onStartDrag: startGroupDrag, onTabDrag: startTabDrag, tabDrag, theme: T };

  // ── Menu bar ───────────────────────────────────────────────────────────────
  const MenuBtn = ({ label, children }) => {
    const [open, setOpen] = React.useState(false);
    return (
      <div style={{ position: 'relative', height: '100%', display: 'flex', alignItems: 'stretch' }}
        onMouseLeave={() => setOpen(false)}>
        <button onClick={() => setOpen(o => !o)}
          style={{ background: open ? '#444' : 'none', border: 'none', color: '#ccc', padding: '0 9px', cursor: 'pointer', fontSize: 12, height: '100%' }}
          onMouseEnter={e => e.currentTarget.style.background = '#444'}
          onMouseLeave={e => e.currentTarget.style.background = open ? '#444' : 'none'}
        >{label}</button>
        {open && (
          <div style={{ position: 'absolute', top: '100%', left: 0, background: '#2a2a2a', border: '1px solid #484848', borderRadius: 2, zIndex: 9998, minWidth: 180, padding: '4px 0', boxShadow: '0 4px 14px rgba(0,0,0,0.55)' }}>
            {children}
          </div>
        )}
      </div>
    );
  };

  const MenuItem = ({ label, shortcut, onClick, divider }) => divider
    ? <div style={{ borderTop: '1px solid #404040', margin: '4px 0' }} />
    : (
      <button onClick={onClick}
        style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', width: '100%', textAlign: 'left', background: 'none', border: 'none', color: '#d0d0d0', padding: '5px 14px', cursor: 'pointer', fontSize: 12, gap: 24 }}
        onMouseEnter={e => e.currentTarget.style.background = '#3a3a3a'}
        onMouseLeave={e => e.currentTarget.style.background = 'none'}
      >
        <span>{label}</span>
        {shortcut && <span style={{ color: '#777', fontSize: 11 }}>{shortcut}</span>}
      </button>
    );

  return (
    <div style={{ width: '100vw', height: '100vh', background: T.appBg, display: 'flex', flexDirection: 'column', overflow: 'hidden', userSelect: 'none', color: T.text, fontSize: 12 }}
      onClick={() => { setWinMenu(false); setShowMobileMenu(false); setShowToolPicker(false); }}>

      {/* ── Menu bar — Desktop ─────────────────────────────────── */}
      {!isMobile && <div style={{ height: 24, background: T.menuBg, borderBottom: '1px solid #1a1a1a', display: 'flex', alignItems: 'stretch', flexShrink: 0, zIndex: 200 }}>
        <MenuBtn label="File">
          <MenuItem label="New Project" shortcut="⌘N" />
          <MenuItem label="Open…" shortcut="⌘O" />
          <MenuItem label="Save" shortcut="⌘S" />
          <MenuItem divider />
          <MenuItem label="Export JSON" />
          <MenuItem label="Export as playable HTML" />
        </MenuBtn>
        <MenuBtn label="Edit">
          <MenuItem label="Undo" shortcut="⌘Z" />
          <MenuItem label="Redo" shortcut="⌘⇧Z" />
          <MenuItem divider />
          <MenuItem label="Cut" shortcut="⌘X" />
          <MenuItem label="Copy" shortcut="⌘C" />
          <MenuItem label="Paste" shortcut="⌘V" />
        </MenuBtn>
        <MenuBtn label="View">
          <MenuItem label="Zoom In" shortcut="⌘+" onClick={() => setZoom(z => Math.min(32, z * 1.2))} />
          <MenuItem label="Zoom Out" shortcut="⌘-" onClick={() => setZoom(z => Math.max(0.05, z * 0.8))} />
          <MenuItem label="Fit Page" shortcut="⌘0" onClick={() => { setZoom(1); setPan({ x: 0, y: 0 }); }} />
          <MenuItem divider />
          <MenuItem label={`${showGrid ? '✓ ' : ''}Show Grid`} shortcut="⌘'" onClick={() => setShowGrid(g => !g)} />
          <MenuItem label={`${showRulers ? '✓ ' : ''}Show Rulers`} shortcut="⌘R" onClick={() => setShowRulers(r => !r)} />
          <MenuItem label={`${outlineMode ? '✓ ' : ''}Outline Mode`} shortcut="⌘Y" onClick={() => setOutlineMode(m => !m)} />
          <MenuItem label={`${snapToGrid ? '✓ ' : ''}Snap to Grid`} shortcut="⌘⇧'" onClick={() => setSnapToGrid(s => !s)} />
          <MenuItem divider />
          <MenuItem label={`${hitZonePreview ? '✓ ' : ''}Hit Zone Preview`} shortcut="⌘⇧H" onClick={() => setHitZonePreview(h => !h)} />
        </MenuBtn>

        {/* Window menu */}
        <div style={{ position: 'relative', height: '100%', display: 'flex', alignItems: 'stretch' }} onClick={e => e.stopPropagation()}>
          <button onClick={() => setWinMenu(o => !o)}
            style={{ background: winMenu ? '#444' : 'none', border: 'none', color: '#ccc', padding: '0 9px', cursor: 'pointer', fontSize: 12, height: '100%' }}
            onMouseEnter={e => e.currentTarget.style.background = '#444'}
            onMouseLeave={e => e.currentTarget.style.background = winMenu ? '#444' : 'none'}
          >Window</button>
          {winMenu && (
            <div style={{ position: 'absolute', top: '100%', left: 0, background: '#2a2a2a', border: '1px solid #484848', borderRadius: 2, zIndex: 9999, minWidth: 210, padding: '4px 0', boxShadow: '0 4px 14px rgba(0,0,0,0.55)' }}>
              <div style={{ padding: '3px 14px 2px', color: '#777', fontSize: 10, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase' }}>Panels</div>
              {Object.entries(PANEL_DEFS).filter(([id]) => enabledPanels[id]).map(([id, def]) => {
                const isOpen = groups.some(g => g.tabs.includes(id));
                const togglePanel = () => {
                  if (isOpen) {
                    // Close: remove tab from its group
                    setGroups(prev => {
                      return prev.map(g => {
                        if (!g.tabs.includes(id)) return g;
                        const newTabs = g.tabs.filter(t => t !== id);
                        return newTabs.length === 0 ? null : { ...g, tabs: newTabs, activeTab: Math.max(0, g.activeTab - 1) };
                      }).filter(Boolean);
                    });
                    setClosedPanels(cp => [...new Set([...cp, id])]);
                  } else {
                    reopenPanel(id);
                  }
                };
                return (
                  <button key={id} onClick={togglePanel}
                    style={{ display: 'flex', alignItems: 'center', gap: 8, width: '100%', textAlign: 'left', background: 'none', border: 'none', color: '#d0d0d0', padding: '5px 14px', cursor: 'pointer', fontSize: 12 }}
                    onMouseEnter={e => e.currentTarget.style.background = '#3a3a3a'}
                    onMouseLeave={e => e.currentTarget.style.background = 'none'}
                  >
                    <span style={{ color: isOpen ? '#5aaa5a' : 'transparent', fontSize: 10 }}>✓</span>
                    {def.label}
                  </button>
                );
              })}
              <div style={{ borderTop: '1px solid #404040', margin: '4px 0' }} />
              <div style={{ padding: '3px 14px 2px', color: '#777', fontSize: 10, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase' }}>Theme</div>
              {Object.entries(THEMES).map(([k, th]) => (
                <button key={k} onClick={() => { setThemeKey(k); setWinMenu(false); }}
                  style={{ display: 'flex', alignItems: 'center', gap: 8, width: '100%', background: 'none', border: 'none', color: '#d0d0d0', padding: '5px 14px', cursor: 'pointer', fontSize: 12 }}
                  onMouseEnter={e => e.currentTarget.style.background = '#3a3a3a'}
                  onMouseLeave={e => e.currentTarget.style.background = 'none'}
                >
                  <span style={{ color: themeKey === k ? '#5aaa5a' : 'transparent', fontSize: 10 }}>✓</span>
                  {th.name}
                </button>
              ))}
              <div style={{ borderTop: '1px solid #404040', margin: '4px 0' }} />
              <button onClick={() => { setGroups(INITIAL_GROUPS); setClosedPanels([]); setZoom(1); setPan({ x: 0, y: 0 }); setWinMenu(false); }}
                style={{ display: 'flex', alignItems: 'center', gap: 8, width: '100%', background: 'none', border: 'none', color: '#d0d0d0', padding: '5px 14px', cursor: 'pointer', fontSize: 12 }}
                onMouseEnter={e => e.currentTarget.style.background = '#3a3a3a'}
                onMouseLeave={e => e.currentTarget.style.background = 'none'}
              >
                <span style={{ color: 'transparent', fontSize: 10 }}>✓</span>
                Reset Panel Layout
              </button>
            </div>
          )}
        </div>

        <MenuBtn label="Help">
          <MenuItem label="Documentation" onClick={() => setShowDocs(true)} />
          <MenuItem label="Keyboard Shortcuts" shortcut="⌘/" onClick={() => setShowShortcuts(true)} />
          <MenuItem divider />
          <MenuItem label="Settings…" onClick={() => setShowSettings(true)} />
        </MenuBtn>

        {/* Center: project name */}
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10 }}>
          <span style={{ color: '#888', cursor: 'pointer', fontSize: 11 }}>←</span>
          <span style={{ color: '#ccc', fontSize: 12 }}>{projectName}</span>
        </div>

        {/* Right: play/edit + controls */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '0 10px', borderLeft: '1px solid #333' }}>
          <button onClick={() => setMode('play')}
            style={{ background: mode === 'play' ? '#1e6ebf' : 'none', border: mode === 'play' ? '1px solid #2a7adf' : '1px solid #555', color: mode === 'play' ? '#fff' : '#ccc', padding: '1px 11px', borderRadius: 3, cursor: 'pointer', fontSize: 11, display: 'flex', alignItems: 'center', gap: 4 }}>
            <svg width="8" height="9" viewBox="0 0 8 9" fill="currentColor"><polygon points="0,0 8,4.5 0,9"/></svg> Play
          </button>
          <button onClick={() => setMode('edit')}
            style={{ background: mode === 'edit' ? '#1e6ebf' : 'none', border: mode === 'edit' ? '1px solid #2a7adf' : '1px solid #555', color: mode === 'edit' ? '#fff' : '#ccc', padding: '1px 11px', borderRadius: 3, cursor: 'pointer', fontSize: 11 }}>Edit</button>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '0 12px', borderLeft: '1px solid #333', color: '#888', fontSize: 11 }}>
          <span style={{ cursor: 'pointer' }}>?</span>
          <span style={{ cursor: 'pointer' }} onClick={() => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }} title="Toggle fullscreen">⤢</span>
          {mode === 'play' && <>
            <span style={{ cursor: 'pointer' }}>🔊 sound</span>
            <span style={{ color: foundCount > 0 ? '#5aaa5a' : '#777' }}>found {foundCount} / {totalCount}</span>
          </>}
        </div>
      </div>}

      {/* ── Top bar — Mobile (phone + tablet) ────────────────── */}
      {isMobile && (
        <div style={{ height: 48, background: T.menuBg, borderBottom: `1px solid ${T.border}`, display: 'flex', alignItems: 'center', padding: '0 12px', gap: 10, flexShrink: 0, zIndex: 200 }}>
          {/* Hamburger */}
          <button onClick={e => { e.stopPropagation(); setShowMobileMenu(m => !m); }}
            style={{ background: 'none', border: 'none', color: '#ccc', cursor: 'pointer', padding: 6, display: 'flex', flexDirection: 'column', gap: 4 }}>
            {[0,1,2].map(i => <div key={i} style={{ width: 20, height: 2, background: '#ccc', borderRadius: 1 }} />)}
          </button>
          {/* Project name */}
          <span style={{ flex: 1, color: '#d0d0d0', fontSize: 14, fontWeight: 500, textAlign: 'center' }}>{projectName}</span>
          {/* Play/Edit */}
          <button onClick={() => setMode(mode === 'play' ? 'edit' : 'play')}
            style={{ background: mode === 'play' ? '#1e6ebf' : '#3a3a3a', border: `1px solid ${mode === 'play' ? '#2a7adf' : '#555'}`, color: '#fff', padding: '6px 16px', borderRadius: 4, cursor: 'pointer', fontSize: 13, fontWeight: 500 }}>
            {mode === 'play' ? 'Edit' : '▶ Play'}
          </button>
          {/* Fullscreen */}
          <button onClick={() => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }}
            title="Toggle fullscreen"
            style={{ background: 'none', border: '1px solid #555', color: '#ccc', padding: '6px 10px', borderRadius: 4, cursor: 'pointer', fontSize: 14 }}>
            ⤢
          </button>
        </div>
      )}

      {/* Mobile hamburger menu */}
      {isMobile && showMobileMenu && (
        <div onClick={e => e.stopPropagation()} style={{ position: 'fixed', top: 48, left: 0, width: 220, background: T.menuBg, border: `1px solid ${T.border}`, borderRadius: '0 0 6px 0', zIndex: 9000, boxShadow: '4px 4px 20px rgba(0,0,0,0.5)', padding: '6px 0' }}>
          {[['New Project',''], ['Open…',''], ['Save',''], ['—',''], ['Export JSON',''], ['Export as playable HTML',''], ['—',''], ['Settings…',''], ['Documentation',''], ['Keyboard Shortcuts','']].map(([label], i) =>
            label === '—'
              ? <div key={i} style={{ borderTop: `1px solid ${T.border}`, margin: '4px 0' }} />
              : <button key={label} onClick={() => {
                  if (label === 'Settings…') setShowSettings(true);
                  if (label === 'Documentation') setShowDocs(true);
                  if (label === 'Keyboard Shortcuts') setShowShortcuts(true);
                  setShowMobileMenu(false);
                }}
                style={{ display: 'block', width: '100%', textAlign: 'left', background: 'none', border: 'none', color: '#d0d0d0', padding: '10px 16px', cursor: 'pointer', fontSize: 14 }}
                onMouseEnter={e => e.currentTarget.style.background = '#3a3a3a'}
                onMouseLeave={e => e.currentTarget.style.background = 'none'}
              >{label}</button>
          )}
          <div style={{ borderTop: `1px solid ${T.border}`, margin: '4px 0' }} />
          <div style={{ padding: '6px 16px 4px', color: '#666', fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase' }}>Panels</div>
          {Object.entries(PANEL_DEFS).map(([id, def]) => (
            <button key={id} onClick={() => { setActiveBottomSheet(id); setShowMobileMenu(false); }}
              style={{ display: 'flex', alignItems: 'center', gap: 8, width: '100%', background: 'none', border: 'none', color: '#d0d0d0', padding: '10px 16px', cursor: 'pointer', fontSize: 14 }}
              onMouseEnter={e => e.currentTarget.style.background = '#3a3a3a'}
              onMouseLeave={e => e.currentTarget.style.background = 'none'}
            >
              <span style={{ fontSize: 10, color: activeBottomSheet === id ? '#5aaa5a' : 'transparent' }}>✓</span>
              {def.label}
            </button>
          ))}
        </div>
      )}

      {/* ── Workspace ─────────────────────────────────────────── */}
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden', position: 'relative' }}>

        {/* Left toolbar — desktop + tablet only */}
        {!isPhone && <div style={{ width: isTablet ? 44 : 36, background: '#262626', borderRight: '1px solid #1a1a1a', display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '5px 0', gap: 1, flexShrink: 0 }}>
          {TOOLS.map((tool, i) => tool === null
            ? <div key={i} style={{ width: 22, borderTop: '1px solid #3a3a3a', margin: '3px 0' }} />
            : (
              <button key={tool.title} title={tool.title}
                onClick={() => setActiveTool(tool.title)}
                style={{ width: 28, height: 28, background: activeTool === tool.title ? '#4a4a4a' : 'none', border: activeTool === tool.title ? '1px solid #5a5a5a' : '1px solid transparent', color: activeTool === tool.title ? '#fff' : '#aaa', cursor: 'pointer', borderRadius: 2, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, transition: 'all 0.08s' }}
                onMouseEnter={e => { if (activeTool !== tool.title) e.currentTarget.style.background = '#3a3a3a'; }}
                onMouseLeave={e => { if (activeTool !== tool.title) e.currentTarget.style.background = 'none'; }}
              >
                {tool.label || tool.icon}
              </button>
            )
          )}
        </div>}

        {/* Canvas + Rulers wrapper */}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
          {/* Top ruler */}
          {showRulers && !isPhone && <div style={{ height: 18, background: '#2a2a2a', borderBottom: '1px solid #1a1a1a', display: 'flex', flexShrink: 0, overflow: 'hidden', position: 'relative' }}>
            <div style={{ width: 18, flexShrink: 0, borderRight: '1px solid #1a1a1a' }} />
            {Array.from({ length: 40 }).map((_, i) => (
              <div key={i} style={{ position: 'absolute', left: 18 + i * 40 + pan.x % 40, bottom: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', pointerEvents: 'none' }}>
                <span style={{ fontSize: 7, color: '#666', marginBottom: 2, userSelect: 'none' }}>{(i * 40 - (pan.x % 40)) | 0}</span>
                <div style={{ width: 1, height: 4, background: '#555' }} />
              </div>
            ))}
          </div>}
          <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
            {/* Left ruler */}
            {showRulers && !isPhone && <div style={{ width: 18, background: '#2a2a2a', borderRight: '1px solid #1a1a1a', overflow: 'hidden', flexShrink: 0, position: 'relative' }}>
              {Array.from({ length: 30 }).map((_, i) => (
                <div key={i} style={{ position: 'absolute', top: i * 40 + pan.y % 40, right: 0, display: 'flex', alignItems: 'center', gap: 1, pointerEvents: 'none' }}>
                  <span style={{ fontSize: 7, color: '#666', writingMode: 'vertical-lr', transform: 'rotate(180deg)', userSelect: 'none' }}>{(i * 40 - (pan.y % 40)) | 0}</span>
                  <div style={{ width: 4, height: 1, background: '#555' }} />
                </div>
              ))}
            </div>}
        {/* Canvas */}
        <div ref={canvasRef} onMouseDown={handleCanvasMouseDown}
          onDoubleClick={e => { if (activeTool !== 'Hand') { setZoom(1); setPan({ x: 0, y: 0 }); } }}
          style={{ flex: 1, background: outlineMode ? '#ffffff' : T.canvasBg, position: 'relative', overflow: 'hidden', cursor: activeTool === 'Hand' ? 'grab' : 'default' }}>
          {/* Grid — moves with pan+zoom */}
          {showGrid && (
            <div style={{ position: 'absolute', inset: 0, transformOrigin: '50% 50%' }}>
            <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', opacity: 0.07 }}>
              <defs>
                <pattern id="grid" width={40 * zoom} height={40 * zoom} patternUnits="userSpaceOnUse"
                  x={pan.x % (40 * zoom)} y={pan.y % (40 * zoom)}>
                  <path d={`M ${40 * zoom} 0 L 0 0 0 ${40 * zoom}`} fill="none" stroke="#888" strokeWidth="0.5"/>
                </pattern>
              </defs>
              <rect width="100%" height="100%" fill="url(#grid)"/>
            </svg>
          </div>
          )}
          {/* Canvas content, scaled */}
          <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <div style={{ transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`, transformOrigin: '50% 50%', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 8, color: '#444', fontSize: 12 }}>
              <svg width="64" height="64" viewBox="0 0 64 64" fill="none" opacity="0.18">
                <circle cx="32" cy="32" r="28" stroke="#888" strokeWidth="2"/>
                <circle cx="32" cy="32" r="12" stroke="#888" strokeWidth="1.5"/>
                <line x1="32" y1="4" x2="32" y2="60" stroke="#888" strokeWidth="1"/>
                <line x1="4" y1="32" x2="60" y2="32" stroke="#888" strokeWidth="1"/>
              </svg>
              <span style={{ color: '#555' }}>Canvas</span>
            </div>
          </div>
          {/* Zoom level badge */}
          <div style={{ position: 'absolute', bottom: 8, left: 8, background: 'rgba(0,0,0,0.4)', color: '#888', fontSize: 10, padding: '2px 7px', borderRadius: 3, pointerEvents: 'none' }}>
            {Math.round(zoom * 100)}%{snapToGrid ? ' · snap' : ''}
          </div>
          {/* Hit Zone preview overlay */}
          {hitZonePreview && (
            <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 10 }}>
              <div style={{ position: 'absolute', left: '30%', top: '25%', width: 80, height: 60, border: '2px solid #ddaa22', background: 'rgba(221,170,34,0.15)', borderRadius: 3, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 9, color: '#ddaa22', fontWeight: 700, letterSpacing: '0.1em' }}>HIT ZONE</div>
              <div style={{ position: 'absolute', left: '55%', top: '45%', width: 70, height: 50, border: '2px solid #cc4444', background: 'rgba(204,68,68,0.15)', borderRadius: 3, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 9, color: '#cc4444', fontWeight: 700, letterSpacing: '0.1em' }}>MISS TAP</div>
              <div style={{ position: 'absolute', left: '20%', top: '55%', width: 70, height: 55, border: '2px dashed #aa44cc', background: 'rgba(170,68,204,0.12)', borderRadius: 3, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 9, color: '#aa44cc', fontWeight: 700, letterSpacing: '0.1em' }}>SURPRISE</div>
            </div>
          )}
          {/* Play mode overlay */}
          {mode === 'play' && (
            <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,10,20,0.82)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 20 }}>
              <div style={{ textAlign: 'center', color: '#fff', padding: 32 }}>
                <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#888', marginBottom: 16 }}>Play Mode</div>
                <div style={{ display: 'flex', gap: 14, justifyContent: 'center', flexWrap: 'wrap', maxWidth: 400, marginBottom: 20 }}>
                  {Array.from({ length: Math.min(totalCount, 8) }).map((_, n) => (
                    <div key={n} onClick={() => setFoundCount(c => n < c ? c : n + 1)}
                      style={{ width: 44, height: 44, borderRadius: '50%', border: `2px solid ${n < foundCount ? '#5aaa5a' : '#444'}`, background: n < foundCount ? '#5aaa5a33' : '#1a1a1a', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', color: n < foundCount ? '#5aaa5a' : '#555', fontSize: 18, transition: 'all 0.15s' }}>
                      {n < foundCount ? '✓' : '?'}
                    </div>
                  ))}
                </div>
                <div style={{ color: '#5aaa5a', fontSize: 14, marginBottom: 6 }}>Found {foundCount} / {totalCount}</div>
                <div style={{ color: '#555', fontSize: 11 }}>Click circles to simulate · Press Edit to return</div>
              </div>
            </div>
          )}
        </div>
          </div>
        </div>
        {/* End canvas + rulers */}

        {/* Right dock — desktop only */}
        {!isMobile && <div style={{ width: 266, background: T.dockBg, borderLeft: `1px solid ${T.border}`, overflowY: 'auto', overflowX: 'hidden', display: 'flex', flexDirection: 'column', flexShrink: 0, position: 'relative' }}>
          {dockedGroups.map(g => <PanelGroup key={g.id} group={g} {...pgProps} />)}
          {nearDock && (
            <div style={{ margin: 5, padding: 14, background: `${T.accent}12`, border: `1px dashed ${T.accent}55`, borderRadius: 3, color: `${T.accent}aa`, fontSize: 11, textAlign: 'center' }}>
              Drop to dock
            </div>
          )}
          {dockedGroups.length === 0 && !nearDock && (
            <div style={{ padding: 16, color: '#555', fontSize: 11, textAlign: 'center', lineHeight: 1.6 }}>
              All panels are floating.<br/>
              <span style={{ color: '#666' }}>Drag a panel here to dock it,<br/>or use Window menu to reopen.</span>
            </div>
          )}
        </div>}

        {/* Tablet: icon strip on right */}
        {isTablet && (
          <div style={{ width: 52, background: T.dockBg, borderLeft: `1px solid ${T.border}`, display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '6px 0', gap: 4, flexShrink: 0, zIndex: 100 }}>
            {Object.entries(PANEL_DEFS).map(([id, def]) => {
              const icons = { layers: '≡', transform: '⊞', properties: '⊡', hitzone: '◎', surprise: '✦', swatches: '▣', navigator: '⊕', history: '↺', difficulty: '⚙', project: '📁' };
              const isActive = tabletOpenPanel === id;
              return (
                <button key={id} title={def.label}
                  onClick={e => { e.stopPropagation(); setTabletOpenPanel(isActive ? null : id); }}
                  style={{ width: 40, height: 40, background: isActive ? T.accent + '33' : 'none', border: `1px solid ${isActive ? T.accent : 'transparent'}`, borderRadius: 4, color: isActive ? T.accent : '#888', cursor: 'pointer', fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 1 }}>
                  <span style={{ fontSize: 14 }}>{icons[id] || '▪'}</span>
                  <span style={{ fontSize: 7, color: isActive ? T.accent : '#666', letterSpacing: '-0.02em', lineHeight: 1 }}>{def.label.slice(0,4)}</span>
                </button>
              );
            })}
          </div>
        )}

        {/* Tablet: panel overlay */}
        {isTablet && tabletOpenPanel && (
          <div onClick={e => e.stopPropagation()} style={{ position: 'absolute', right: 52, top: 0, bottom: 0, width: 280, background: T.dockBg, borderLeft: `1px solid ${T.border}`, boxShadow: '-4px 0 20px rgba(0,0,0,0.5)', zIndex: 99, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
            <div style={{ background: T.headerBg, borderBottom: `1px solid ${T.border}`, padding: '10px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexShrink: 0 }}>
              <span style={{ fontWeight: 600, fontSize: 13, color: '#d0d0d0' }}>{PANEL_DEFS[tabletOpenPanel]?.label}</span>
              <button onClick={() => setTabletOpenPanel(null)} style={{ background: 'none', border: 'none', color: '#888', cursor: 'pointer', fontSize: 18, lineHeight: 1 }}>×</button>
            </div>
            <div style={{ flex: 1, overflowY: 'auto' }}>
              {PANEL_DEFS[tabletOpenPanel]?.render()}
            </div>
          </div>
        )}

        {/* Dock drop overlay — desktop only */}
        {!isMobile && nearDock && <DockDropOverlay active />}

        {/* Floating panels — desktop only */}
        {!isMobile && floatingGroups.map(g => <PanelGroup key={g.id} group={g} {...pgProps} />)}

        {/* Phone: floating tool picker button — edit mode only */}
        {isPhone && mode === 'edit' && (
          <div style={{ position: 'absolute', bottom: 80, left: 16, zIndex: 200 }}>
            <button onClick={e => { e.stopPropagation(); setShowToolPicker(t => !t); }}
              style={{ width: 52, height: 52, borderRadius: '50%', background: T.accent, border: 'none', color: '#fff', fontSize: 20, cursor: 'pointer', boxShadow: '0 4px 16px rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              {TOOLS.find(t => t && t.title.startsWith(activeTool))?.icon || '◈'}
            </button>
            {showToolPicker && (
              <div onClick={e => e.stopPropagation()} style={{ position: 'absolute', bottom: 60, left: 0, background: T.panelBg, border: `1px solid ${T.border}`, borderRadius: 8, padding: 8, boxShadow: '0 4px 20px rgba(0,0,0,0.6)', display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 6, width: 168 }}>
                {TOOLS.filter(Boolean).map(tool => (
                  <button key={tool.title} title={tool.title}
                    onClick={() => { setActiveTool(tool.title.split(' ')[0]); setShowToolPicker(false); }}
                    style={{ width: 48, height: 48, background: activeTool === tool.title.split(' ')[0] ? T.accent + '33' : T.headerBg, border: `1px solid ${activeTool === tool.title.split(' ')[0] ? T.accent : T.border}`, borderRadius: 6, color: activeTool === tool.title.split(' ')[0] ? T.accent : '#aaa', cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2, fontSize: 13 }}>
                    {tool.icon}
                    <span style={{ fontSize: 7, color: '#666' }}>{tool.title.split(' ')[0]}</span>
                  </button>
                ))}
              </div>
            )}
          </div>
        )}

        {/* Phone: bottom sheet */}
        {isPhone && activeBottomSheet && (
          <div onClick={e => e.stopPropagation()} style={{ position: 'absolute', bottom: 0, left: 0, right: 0, background: T.panelBg, borderTop: `2px solid ${T.accent}`, borderRadius: '12px 12px 0 0', zIndex: 300, maxHeight: '70vh', display: 'flex', flexDirection: 'column', boxShadow: '0 -4px 24px rgba(0,0,0,0.6)' }}>
            {/* Handle + title */}
            <div style={{ display: 'flex', alignItems: 'center', padding: '10px 16px 6px', flexShrink: 0, borderBottom: `1px solid ${T.border}` }}>
              <div style={{ width: 36, height: 4, background: '#555', borderRadius: 2, margin: '0 auto 8px', position: 'absolute', left: '50%', transform: 'translateX(-50%)', top: 8 }} />
              <span style={{ fontWeight: 600, fontSize: 14, color: '#d0d0d0', flex: 1, marginTop: 4 }}>{PANEL_DEFS[activeBottomSheet]?.label}</span>
              <button onClick={() => setActiveBottomSheet(null)} style={{ background: 'none', border: 'none', color: '#888', cursor: 'pointer', fontSize: 20, lineHeight: 1, padding: 4 }}>×</button>
            </div>
            {/* Panel content */}
            <div style={{ overflowY: 'auto', flex: 1 }}>
              {PANEL_DEFS[activeBottomSheet]?.render()}
            </div>
            {/* Quick panel switcher */}
            <div style={{ display: 'flex', borderTop: `1px solid ${T.border}`, background: T.headerBg, flexShrink: 0, overflowX: 'auto' }}>
              {Object.entries(PANEL_DEFS).map(([id, def]) => (
                <button key={id} onClick={() => setActiveBottomSheet(id)}
                  style={{ flex: '0 0 auto', padding: '8px 14px', background: activeBottomSheet === id ? T.accent + '22' : 'none', border: 'none', color: activeBottomSheet === id ? T.accent : '#777', cursor: 'pointer', fontSize: 11, borderBottom: activeBottomSheet === id ? `2px solid ${T.accent}` : '2px solid transparent', whiteSpace: 'nowrap' }}>
                  {def.label}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Tab drag ghost — desktop only */}
        {!isMobile && tabDrag && (
          <div style={{ position: 'fixed', left: tabDrag.x - 52, top: tabDrag.y - 13, background: '#2d4a6d', border: '1px solid #4a8acc', color: '#ccc', padding: '3px 12px', fontSize: 12, borderRadius: 3, pointerEvents: 'none', zIndex: 9999, boxShadow: '0 2px 10px rgba(0,0,0,0.55)' }}>
            {PANEL_DEFS[tabDrag.tabId]?.label}
          </div>
        )}
      </div>

      {/* Keyboard Shortcuts Modal */}
      {showShortcuts && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', zIndex: 9999, display: 'flex', alignItems: 'center', justifyContent: 'center' }}
          onClick={() => setShowShortcuts(false)}>
          <div onClick={e => e.stopPropagation()} style={{ background: '#2e2e2e', border: '1px solid #484848', borderRadius: 4, width: 520, maxHeight: '80vh', overflow: 'auto', boxShadow: '0 12px 40px rgba(0,0,0,0.7)', color: '#d0d0d0', fontSize: 12 }}>
            <div style={{ background: '#252525', borderBottom: '1px solid #484848', padding: '10px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span style={{ fontWeight: 700, fontSize: 13 }}>Keyboard Shortcuts</span>
              <button onClick={() => setShowShortcuts(false)} style={{ background: 'none', border: 'none', color: '#888', cursor: 'pointer', fontSize: 18, lineHeight: 1 }}>×</button>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 0 }}>
              {[
                ['Tools', [['V', 'Select'], ['H', 'Hand / Pan'], ['P', 'Draw'], ['E', 'Erase'], ['R', 'Rectangle'], ['O', 'Ellipse'], ['S', 'Star'], ['A', 'Add object'], ['U', 'Surprise']]],
                ['View', [['⌘+ | Ctrl+', 'Zoom in'], ['⌘- | Ctrl-', 'Zoom out'], ['⌘0 | Ctrl+0', 'Fit page'], ["⌘' | Ctrl+'", 'Show/hide grid'], ['⌘R | Ctrl+R', 'Show/hide rulers'], ['⌘Y | Ctrl+Y', 'Outline mode'], ['⌘⇧H | Ctrl+⇧H', 'Hit zone preview'], ["⌘⇧' | Ctrl+⇧'", 'Snap to grid']]],
                ['Edit', [['⌘Z | Ctrl+Z', 'Undo'], ['⌘⇧Z | Ctrl+Y', 'Redo'], ['⌘X | Ctrl+X', 'Cut'], ['⌘C | Ctrl+C', 'Copy'], ['⌘V | Ctrl+V', 'Paste'], ['⌘D | Ctrl+D', 'Duplicate'], ['⌫ | Del', 'Delete']]],
                ['Panels', [['⌘/ | Ctrl+/', 'Shortcuts'], ['⌘⇧L | Ctrl+⇧L', 'Layers'], ['⌘⇧P | Ctrl+⇧P', 'Properties'], ['⌘⇧T | Ctrl+⇧T', 'Transform'], ['⌘⇧W | Ctrl+⇧W', 'Swatches']]],
              ].map(([section, items]) => (
                <div key={section} style={{ padding: '12px 16px', borderRight: '1px solid #3a3a3a', borderBottom: '1px solid #3a3a3a' }}>
                  <div style={{ color: '#8a8a8a', fontSize: 10, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8 }}>{section}</div>
                  {items.map(([key, label]) => (
                    <div key={key} style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5 }}>
                      <span style={{ color: '#aaa' }}>{label}</span>
                      <kbd style={{ background: '#1a1a1a', border: '1px solid #484848', borderRadius: 3, padding: '1px 6px', fontSize: 11, color: '#d0d0d0', fontFamily: 'inherit' }}>{key}</kbd>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

            {showDocs && <DocsModal onClose={() => setShowDocs(false)} />}

      {/* Settings Modal */}
      {showSettings && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', zIndex: 9999, display: 'flex', alignItems: 'center', justifyContent: 'center' }}
          onClick={() => setShowSettings(false)}>
          <div onClick={e => e.stopPropagation()} style={{ background: '#2e2e2e', border: '1px solid #484848', borderRadius: 4, width: 480, boxShadow: '0 12px 40px rgba(0,0,0,0.7)', color: '#d0d0d0', fontSize: 12 }}>
            <div style={{ background: '#252525', borderBottom: '1px solid #484848', padding: '10px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span style={{ fontWeight: 700, fontSize: 13 }}>Settings</span>
              <button onClick={() => setShowSettings(false)} style={{ background: 'none', border: 'none', color: '#888', cursor: 'pointer', fontSize: 18, lineHeight: 1 }}>×</button>
            </div>
            <SettingsModalBody onClose={() => setShowSettings(false)} enabledPanels={enabledPanels} setEnabledPanels={setEnabledPanels} panelDefs={PANEL_DEFS} />
          </div>
        </div>
      )}

      {/* Status bar — desktop + tablet only */}
      {!isPhone && <div style={{ height: 20, background: T.menuBg, borderTop: '1px solid #1a1a1a', display: 'flex', alignItems: 'center', padding: '0 12px', gap: 20, flexShrink: 0, color: '#666', fontSize: 10 }}>
        <span>{projectName}</span>
      </div>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
